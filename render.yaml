services:
  - type: web
    name: planning-tool
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node proxy.js
    envVars:
      - key: NODE_ENV
        value: production
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
